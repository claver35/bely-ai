<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELY AI — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#161820;border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:40px;width:100%;max-width:420px}
.logo{font-size:22px;font-weight:600;color:#fff;text-align:center;margin-bottom:28px}
.logo span{color:#7F77DD}
.tabs{display:flex;border-bottom:0.5px solid rgba(255,255,255,0.08);margin-bottom:24px}
.tab{flex:1;padding:12px;text-align:center;font-size:15px;font-weight:500;color:#888780;cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#7F77DD;border-bottom-color:#7F77DD}
.panel{display:none}
.panel.active{display:block}
.group{margin-bottom:16px}
.group label{display:block;font-size:13px;color:#888780;margin-bottom:6px}
.group input{width:100%;padding:11px 14px;background:#0f1117;border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;color:#e8e6e1;font-size:14px;outline:none}
.group input:focus{border-color:#7F77DD}
.submit{width:100%;padding:13px;border-radius:8px;border:none;font-size:15px;font-weight:600;cursor:pointer;background:#534AB7;color:#fff;margin-top:6px}
.submit:hover{background:#7F77DD}
.msg{font-size:13px;padding:10px;border-radius:8px;margin-top:12px;display:none;text-align:center}
.err{background:rgba(226,75,74,0.12);color:#F09595}
.suc{background:rgba(99,153,34,0.12);color:#97C459}
.back{text-align:center;margin-top:20px;font-size:13px;color:#5F5E5A}
.back a{color:#7F77DD;text-decoration:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">BELY <span>AI</span></div>
  <div class="tabs">
    <button class="tab active" id="t1" onclick="show('login')">Sign In</button>
    <button class="tab" id="t2" onclick="show('register')">Create Account</button>
  </div>
  <div class="panel active" id="login">
    <div class="group"><label>Email</label><input type="email" id="le" placeholder="you@example.com"></div>
    <div class="group"><label>Password</label><input type="password" id="lp" placeholder="••••••••"></div>
    <button class="submit" onclick="login()">Sign In</button>
    <div class="msg err" id="le2"></div>
    <div class="msg suc" id="ls"></div>
  </div>
  <div class="panel" id="register">
    <div class="group"><label>Email</label><input type="email" id="re" placeholder="you@example.com"></div>
    <div class="group"><label>Password</label><input type="password" id="rp" placeholder="Min. 6 characters"></div>
    <button class="submit" onclick="reg()">Create Free Account</button>
    <div class="msg err" id="re2"></div>
    <div class="msg suc" id="rs"></div>
  </div>
  <div class="back"><a href="index.html">← Back to home</a></div>
</div>
<script>
const sb=window.supabase.createClient('https://txuanbvyjohgvuynlfyq.supabase.co','sb_publishable_cnsy47rWJ8FopKQuiSTz4w_HPXd9-Ls');
function show(p){
  document.getElementById('login').className='panel'+(p==='login'?' active':'');
  document.getElementById('register').className='panel'+(p==='register'?' active':'');
  document.getElementById('t1').className='tab'+(p==='login'?' active':'');
  document.getElementById('t2').className='tab'+(p==='register'?' active':'');
}
function msg(id,txt,type){const e=document.getElementById(id);e.textContent=txt;e.className='msg '+(type==='err'?'err':'suc');e.style.display='block'}
async function login(){
  const e=document.getElementById('le').value.trim();
  const p=document.getElementById('lp').value;
  if(!e||!p)return msg('le2','Please fill in all fields.','err');
  const{error}=await sb.auth.signInWithPassword({email:e,password:p});
  if(error)return msg('le2',error.message,'err');
  msg('ls','Welcome! Redirecting...','suc');
  setTimeout(()=>location.href='dashboard.html',1200);
}
async function reg(){
  const e=document.getElementById('re').value.trim();
  const p=document.getElementById('rp').value;
  if(!e||!p)return msg('re2','Please fill in all fields.','err');
  if(p.length<6)return msg('re2','Min. 6 characters.','err');
  const{error}=await sb.auth.signUp({email:e,password:p});
  if(error)return msg('re2',error.message,'err');
  msg('rs','Account created! Redirecting...','suc');
  setTimeout(()=>location.href='dashboard.html',1500);
}
</script>
</body>
</html>
