<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELY AI — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo{font-size:24px;font-weight:600;color:#fff;margin-bottom:32px;letter-spacing:-.5px}
.logo span{color:#7F77DD}
.card{background:#161820;border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:36px;width:100%;max-width:400px}
.tabs{display:flex;gap:0;margin-bottom:28px;border-bottom:0.5px solid rgba(255,255,255,0.08)}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:500;color:#888780;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .2s}
.tab.active{color:#7F77DD;border-bottom-color:#7F77DD}
.form-group{margin-bottom:18px}
label{display:block;font-size:13px;color:#888780;margin-bottom:7px}
input{width:100%;padding:11px 14px;background:#0f1117;border:0.5px solid rgba(255,255,255,0.12);border-radius:8px;color:#e8e6e1;font-size:14px;outline:none;transition:border .2s}
input:focus{border-color:#534AB7}
.btn{width:100%;padding:13px;border-radius:8px;border:none;font-size:15px;font-weight:600;cursor:pointer;transition:background .2s;margin-top:8px}
.btn-primary{background:#534AB7;color:#fff}
.btn-primary:hover{background:#7F77DD}
.btn-primary:disabled{background:#2a2545;color:#5F5E5A;cursor:not-allowed}
.msg{font-size:13px;padding:10px 14px;border-radius:8px;margin-top:14px;display:none}
.msg-error{background:rgba(226,75,74,0.12);color:#F09595;border:0.5px solid rgba(226,75,74,0.25)}
.msg-success{background:rgba(99,153,34,0.12);color:#97C459;border:0.5px solid rgba(99,153,34,0.25)}
.divider{text-align:center;font-size:12px;color:#5F5E5A;margin:16px 0}
.back{text-align:center;margin-top:20px;font-size:13px;color:#5F5E5A}
.back a{color:#7F77DD;text-decoration:none}
.back a:hover{text-decoration:underline}
.form-panel{display:none}
.form-panel.active{display:block}
</style>
</head>
<body>

<div class="logo">BELY <span>AI</span></div>

<div class="card">
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login')">Sign In</div>
    <div class="tab" onclick="switchTab('register')">Create Account</div>
  </div>

  <!-- GİRİŞ FORMU -->
  <div class="form-panel active" id="login-panel">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="login-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="btn btn-primary" id="login-btn" onclick="login()">Sign In</button>
    <div class="msg msg-error" id="login-error"></div>
    <div class="msg msg-success" id="login-success"></div>
  </div>

  <!-- KAYIT FORMU -->
  <div class="form-panel" id="register-panel">
    <div class="form-group">
      <label>Email address</label>
      <input type="email" id="reg-email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="reg-password" placeholder="Min. 6 characters">
    </div>
    <div class="form-group">
      <label>Store name <span style="color:#5F5E5A">(optional)</span></label>
      <input type="text" id="reg-store" placeholder="My Shopify Store">
    </div>
    <button class="btn btn-primary" id="reg-btn" onclick="register()">Create Account — Free</button>
    <div class="msg msg-error" id="reg-error"></div>
    <div class="msg msg-success" id="reg-success"></div>
  </div>

  <div class="divider">Secure login powered by BELY AI</div>
</div>

<div class="back"><a href="index.html">← Back to home</a></div>

<script>
const SUPABASE_URL = 'https://txuanbvyjohgvuynlfyq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_cnsy47rWJ8FopKQuiSTz4w_HPXd9-Ls';
const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', (tab==='login' && i===0)||(tab==='register' && i===1));
  });
  document.getElementById('login-panel').classList.toggle('active', tab==='login');
  document.getElementById('register-panel').classList.toggle('active', tab==='register');
}

function showMsg(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'msg msg-' + type;
  el.style.display = 'block';
}

async function login() {
  const email = document.getElementById('login-email').value.trim();
  const pass = document.getElementById('login-password').value;
  const btn = document.getElementById('login-btn');
  if (!email || !pass) return showMsg('login-error','Please fill in all fields.','error');
  btn.disabled = true; btn.textContent = 'Signing in...';
  const { error } = await supabase.auth.signInWithPassword({ email, password: pass });
  if (error) {
    showMsg('login-error', error.message, 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  } else {
    showMsg('login-success', 'Welcome back! Redirecting...', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  }
}

async function register() {
  const email = document.getElementById('reg-email').value.trim();
  const pass = document.getElementById('reg-password').value;
  const btn = document.getElementById('reg-btn');
  if (!email || !pass) return showMsg('reg-error','Please fill in all fields.','error');
  if (pass.length < 6) return showMsg('reg-error','Password must be at least 6 characters.','error');
  btn.disabled = true; btn.textContent = 'Creating account...';
  const { error } = await supabase.auth.signUp({ email, password: pass });
  if (error) {
    showMsg('reg-error', error.message, 'error');
    btn.disabled = false; btn.textContent = 'Create Account — Free';
  } else {
    showMsg('reg-success', 'Account created! Redirecting to dashboard...', 'success');
    setTimeout(() => window.location.href = 'dashboard.html', 1500);
  }
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const active = document.querySelector('.form-panel.active').id;
    if (active === 'login-panel') login();
    else register();
  }
});
</script>
</body>
</html>
