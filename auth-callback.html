<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELY AI — Connecting Store...</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1117;color:#e8e6e1;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:#161820;border:0.5px solid rgba(255,255,255,0.08);border-radius:16px;padding:48px 40px;text-align:center;max-width:500px;width:100%}
.logo{font-size:20px;font-weight:700;color:#fff;margin-bottom:32px}.logo span{color:#00d4ff}
.spinner{width:48px;height:48px;border:3px solid rgba(0,212,255,0.15);border-top-color:#00d4ff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
.title{font-size:18px;font-weight:600;color:#fff;margin-bottom:8px}
.status{font-size:13px;color:#00d4ff;margin-top:16px;font-weight:500;word-break:break-all}
.err-box{background:rgba(248,113,113,0.1);border:0.5px solid rgba(248,113,113,0.25);border-radius:8px;padding:14px;margin-top:20px;font-size:13px;color:#fca5a5;display:none;word-break:break-all}
.token-box{background:rgba(74,222,128,0.1);border:0.5px solid rgba(74,222,128,0.25);border-radius:8px;padding:14px;margin-top:20px;font-size:12px;color:#4ade80;display:none;word-break:break-all;text-align:left}
.btn{padding:12px 28px;border-radius:8px;background:linear-gradient(90deg,#00d4ff,#0099cc);border:none;color:#fff;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">BELY <span>AI</span></div>
  <div class="spinner" id="spinner"></div>
  <div class="title" id="title">Connecting your Shopify store...</div>
  <div class="status" id="status">Verifying authorization...</div>
  <div class="err-box" id="err"></div>
  <div class="token-box" id="token-box"></div>
  <button class="btn" id="btn">Go to Dashboard</button>
</div>

<script>
async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const shop = params.get('shop');

  if (!code || !shop) {
    showError('Missing parameters: code=' + code + ' shop=' + shop);
    return;
  }

  setStatus('Got code: ' + code.substring(0, 10) + '... Exchanging...');

  try {
    const tokenRes = await fetch('/api/shopify-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, shop })
    });

    const rawText = await tokenRes.text();
    setStatus('Raw response: ' + rawText.substring(0, 200));

    let tokenData;
    try { tokenData = JSON.parse(rawText); } 
    catch(e) { showError('JSON parse failed: ' + rawText.substring(0, 200)); return; }

    if (!tokenData.access_token) {
      showError('No access_token in response: ' + JSON.stringify(tokenData));
      return;
    }

    // Token göster
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'Token received!';
    const tokenBox = document.getElementById('token-box');
    tokenBox.style.display = 'block';
    tokenBox.textContent = 'ACCESS TOKEN: ' + tokenData.access_token;

    // localStorage'a kaydet
    localStorage.setItem('shopify_token', tokenData.access_token);
    localStorage.setItem('shopify_shop', shop);

    // Dashboard'a yönlendir
    document.getElementById('btn').style.display = 'inline-block';
    document.getElementById('btn').onclick = () => {
      location.href = 'dashboard.html?token=' + encodeURIComponent(tokenData.access_token) + '&shop=' + encodeURIComponent(shop);
    };

  } catch (e) {
    showError('Fetch error: ' + e.message);
  }
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = 'Debug info:';
  const err = document.getElementById('err');
  err.textContent = msg;
  err.style.display = 'block';
}

handleCallback();
</script>
</body>
</html>
