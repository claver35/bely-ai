<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELY AI — Connecting Store...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#05070d;color:#e8eefb;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:16px;padding:48px 40px;text-align:center;max-width:420px;width:100%}
.logo{font-size:20px;font-weight:700;color:#fff;margin-bottom:32px}.logo span{color:#4ea8ff}
.spinner{width:48px;height:48px;border:3px solid rgba(78,168,255,0.15);border-top-color:#4ea8ff;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
.title{font-size:18px;font-weight:600;color:#fff;margin-bottom:8px}
.sub{font-size:14px;color:#8a96ad;line-height:1.6}
.status{font-size:13px;color:#4ea8ff;margin-top:16px;font-weight:500}
.err-box{background:rgba(255,93,108,0.1);border:0.5px solid rgba(255,93,108,0.25);border-radius:8px;padding:14px;margin-top:20px;font-size:13px;color:#ff8a96;display:none}
.btn{padding:12px 28px;border-radius:8px;background:#4ea8ff;border:none;color:#001024;font-size:14px;font-weight:700;cursor:pointer;margin-top:20px;display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">BELY <span>AI</span></div>
  <div class="spinner" id="spinner"></div>
  <div class="title" id="title">Connecting your Shopify store...</div>
  <div class="sub" id="sub">Please wait while we securely connect your store to BELY AI.</div>
  <div class="status" id="status">Verifying authorization...</div>
  <div class="err-box" id="err"></div>
  <button class="btn" id="btn">Go to Dashboard</button>
</div>
<script>
const sb = window.supabase.createClient(
  'https://txuanbvyjohgvuynlfyq.supabase.co',
  'sb_publishable_cnsy47rWJ8FopKQuiSTz4w_HPXd9-Ls'
);
async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const shop = params.get('shop');
  if (!code || !shop) { showError('Missing authorization parameters.'); return; }
  setStatus('Exchanging authorization code...');
  try {
    const tokenRes = await fetch('/api/shopify-token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, shop })
    });
    const tokenData = await tokenRes.json();
    if (!tokenData.access_token) { showError('Connection failed: ' + JSON.stringify(tokenData)); return; }
    setStatus('Saving store connection...');
    localStorage.setItem('shopify_token', tokenData.access_token);
    localStorage.setItem('shopify_shop', shop);
    const { data: { session } } = await sb.auth.getSession();
    if (session) {
      const trialEnd = new Date();
      trialEnd.setDate(trialEnd.getDate() + 7);
      await sb.from('shopify_stores').upsert({
        user_id: session.user.id,
        shop_domain: shop,
        access_token: tokenData.access_token,
        connected_at: new Date().toISOString(),
        trial_end_date: trialEnd.toISOString(),
        status: 'trial'
      });
    }
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('title').textContent = 'Store connected!';
    document.getElementById('sub').textContent = shop + ' is now protected. Your 7-day free trial has started!';
    document.getElementById('status').style.color = '#3ddc97';
    document.getElementById('status').textContent = 'Connection verified — redirecting...';
    document.getElementById('btn').style.display = 'inline-block';
    document.getElementById('btn').onclick = () => location.href = 'dashboard.html';
    setTimeout(() => location.href = 'dashboard.html?token=' + encodeURIComponent(tokenData.access_token) + '&shop=' + encodeURIComponent(shop), 2000);
  } catch (e) {
    showError('Connection error. Please try again.');
  }
}
function setStatus(msg) { document.getElementById('status').textContent = msg; }
function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('title').textContent = 'Connection failed';
  document.getElementById('sub').textContent = 'Something went wrong while connecting your store.';
  document.getElementById('status').style.display = 'none';
  const err = document.getElementById('err');
  err.textContent = msg; err.style.display = 'block';
  document.getElementById('btn').textContent = 'Try Again';
  document.getElementById('btn').onclick = () => location.href = 'index.html';
  document.getElementById('btn').style.display = 'inline-block';
}
handleCallback();
</script>
</body>
</html>
