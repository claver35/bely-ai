<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BELY AI — Elite Fraud Raporu</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#03050a;--bg2:#070b14;--bg3:#0a0f1c;
  --cyan:#00e5ff;--green:#00ff88;--red:#ff3d57;--orange:#ffab00;
  --line2:rgba(255,255,255,0.07);
  --ink:#ffffff;--ink2:#a0a8c0;--ink3:#3a3f55;
  --sans:'Syne',system-ui,sans-serif;--mono:'DM Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--sans);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,229,255,0.012) 2px,rgba(0,229,255,0.012) 4px);pointer-events:none;z-index:1000}

/* NAV */
nav{position:sticky;top:0;z-index:200;background:rgba(3,5,10,0.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--line2);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px}
.nav-logo{display:flex;align-items:center;gap:10px;font-weight:800;font-size:17px;letter-spacing:-.02em;text-decoration:none;color:#fff}
.nav-logo-icon{width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,var(--cyan),#0099cc);display:grid;place-items:center;font-family:var(--mono);font-size:13px;color:#000;font-weight:700}
.nav-logo-ai{color:var(--cyan)}
.nav-right{display:flex;align-items:center;gap:10px}
.elite-badge{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:5px 14px;border-radius:20px;background:rgba(0,255,136,0.2);color:var(--green);border:1px solid rgba(0,255,136,0.5)}
.btn-back{font-size:13px;padding:7px 16px;border-radius:7px;border:1px solid rgba(255,255,255,0.25);background:transparent;color:#fff;cursor:pointer;font-family:var(--sans);font-weight:600;text-decoration:none;display:flex;align-items:center;gap:6px}
.btn-back:hover{background:rgba(255,255,255,0.1)}

/* PAGE */
.page{max-width:1200px;margin:0 auto;padding:28px 24px}

/* SUMMARY CARDS */
.summary-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:28px}
.sc{background:var(--bg2);border:1px solid var(--line2);border-radius:14px;padding:18px;text-align:center;position:relative;overflow:hidden}
.sc::after{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc-red::after{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.sc-orange::after{background:linear-gradient(90deg,transparent,var(--orange),transparent)}
.sc-green::after{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.sc-cyan::after{background:linear-gradient(90deg,transparent,var(--cyan),transparent)}
.sc-gray::after{background:linear-gradient(90deg,transparent,#6a7090,transparent)}
.sc-val{font-size:36px;font-weight:800;font-family:var(--mono);letter-spacing:-.04em;line-height:1;margin-bottom:6px}
.sc-red .sc-val{color:var(--red)}
.sc-orange .sc-val{color:var(--orange)}
.sc-green .sc-val{color:var(--green)}
.sc-cyan .sc-val{color:var(--cyan)}
.sc-gray .sc-val{color:#a0a8c0}
.sc-label{font-size:11px;color:var(--ink2);font-family:var(--mono);text-transform:uppercase;letter-spacing:.08em}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid rgba(255,255,255,0.1);background:transparent;color:var(--ink2);font-family:var(--sans);transition:all .15s}
.filter-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,0.08)}
.filter-btn:hover{border-color:rgba(255,255,255,0.3);color:#fff}
.filter-count{font-size:10px;background:rgba(255,255,255,0.1);padding:1px 6px;border-radius:10px;margin-left:4px}

/* REPORT TABLE */
.report-header{display:grid;grid-template-columns:80px 120px 100px 1fr 120px 100px;gap:12px;padding:10px 16px;font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);border-bottom:1px solid var(--line2);margin-bottom:8px}
.report-list{display:flex;flex-direction:column;gap:8px}

/* REPORT CARD */
.report-card{background:var(--bg2);border:1px solid var(--line2);border-radius:12px;overflow:hidden;transition:border-color .15s;cursor:pointer}
.report-card:hover{border-color:rgba(255,255,255,0.18)}
.report-card.expanded{border-color:rgba(0,229,255,0.3)}
.rc-main{display:grid;grid-template-columns:80px 120px 100px 1fr 120px 100px;gap:12px;padding:14px 16px;align-items:center}
.rc-num{font-family:var(--mono);font-size:13px;color:var(--cyan);font-weight:600}
.rc-price{font-size:15px;font-weight:800;color:#fff}
.rc-date{font-family:var(--mono);font-size:11px;color:var(--ink2)}
.rc-risks{font-size:12px;color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rc-risks.has-risk{color:#ffd080}
.risk-badge{padding:5px 12px;border-radius:6px;font-family:var(--mono);font-size:11px;font-weight:800;text-align:center;white-space:nowrap}
.rb-high{background:rgba(255,61,87,0.2);color:#ff6b82;border:1px solid rgba(255,61,87,0.5)}
.rb-medium{background:rgba(255,171,0,0.2);color:#ffbc33;border:1px solid rgba(255,171,0,0.5)}
.rb-low{background:rgba(0,255,136,0.15);color:#00ff88;border:1px solid rgba(0,255,136,0.4)}
.rc-expand{font-size:12px;color:var(--ink3);text-align:right;transition:transform .2s}
.report-card.expanded .rc-expand{transform:rotate(180deg)}

/* EXPANDED DETAIL */
.rc-detail{display:none;padding:0 16px 16px;border-top:1px solid var(--line2);margin-top:0}
.report-card.expanded .rc-detail{display:block}
.detail-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}
.detail-block{background:var(--bg3);border:1px solid var(--line2);border-radius:10px;padding:14px}
.db-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:10px}
.db-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;font-size:12px}
.db-row:last-child{margin-bottom:0}
.db-key{color:var(--ink2)}
.db-val{color:#fff;font-weight:600;font-family:var(--mono);font-size:11px}
.db-val.risk{color:var(--red)}
.db-val.safe{color:var(--green)}
.db-val.warn{color:var(--orange)}

/* RISK REASONS */
.risk-reasons{margin-top:12px}
.rr-title{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--ink3);margin-bottom:8px}
.rr-list{display:flex;flex-direction:column;gap:6px}
.rr-item{display:flex;align-items:center;gap:8px;font-size:12px;padding:8px 12px;border-radius:6px}
.rr-high{background:rgba(255,61,87,0.1);color:#ff9aaa;border-left:3px solid var(--red)}
.rr-med{background:rgba(255,171,0,0.1);color:#ffd080;border-left:3px solid var(--orange)}
.rr-low{background:rgba(0,255,136,0.08);color:#80ffb8;border-left:3px solid var(--green)}

/* EMPTY / LOADING */
.empty-state{padding:60px;text-align:center;color:var(--ink2)}
.es-icon{font-size:48px;margin-bottom:16px}
.es-title{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px}
.es-sub{font-size:14px;line-height:1.6}
.loading{display:flex;flex-direction:column;align-items:center;gap:16px;padding:60px}
.spinner{width:40px;height:40px;border:3px solid rgba(0,229,255,0.15);border-top-color:var(--cyan);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.2}}

/* ELITE GATE */
.elite-gate{max-width:500px;margin:80px auto;text-align:center;padding:40px;background:var(--bg2);border:1px solid rgba(0,255,136,0.2);border-radius:20px}
.eg-icon{font-size:48px;margin-bottom:16px}
.eg-title{font-size:24px;font-weight:800;margin-bottom:10px}
.eg-sub{font-size:14px;color:var(--ink2);line-height:1.65;margin-bottom:24px}
.eg-btn{padding:14px 28px;border-radius:10px;border:none;background:linear-gradient(90deg,var(--green),#00b050);color:#000;font-size:15px;font-weight:800;cursor:pointer;font-family:var(--sans)}

@media(max-width:900px){
  .summary-row{grid-template-columns:repeat(3,1fr)}
  .report-header,.rc-main{grid-template-columns:70px 100px 1fr 90px 30px}
  .rc-date,.detail-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="dashboard.html">
    <div class="nav-logo-icon">B</div>
    BELY <span class="nav-logo-ai">AI</span>
  </a>
  <div class="nav-right">
    <span class="elite-badge">⚡ Shield Elite</span>
    <a class="btn-back" href="dashboard.html">← Dashboard</a>
  </div>
</nav>

<div class="page">
  <div style="margin-bottom:24px">
    <div style="font-size:24px;font-weight:800;letter-spacing:-.03em">Elite Fraud Raporu</div>
    <div style="font-size:13px;color:var(--ink2);margin-top:4px;display:flex;align-items:center;gap:8px">
      <span style="width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;display:inline-block"></span>
      Tüm siparişlerin detaylı risk analizi — yalnızca Elite üyelere özel
    </div>
  </div>

  <div id="main-content">
    <div class="loading">
      <div class="spinner"></div>
      <div style="font-family:var(--mono);font-size:12px;color:var(--cyan)">Raporlar yükleniyor...</div>
    </div>
  </div>
</div>

<script>
const sb = window.supabase.createClient(
  'https://txuanbvyjohgvuynlfyq.supabase.co',
  'sb_publishable_cnsy47rWJ8FopKQuiSTz4w_HPXd9-Ls'
);

const PRICE_IDS = {
  elite: 'pri_01kpnv1whkq97tr638rt08vz09'
};

let allOrders = [];
let currentFilter = 'all';

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('tr-TR', { day:'2-digit', month:'short', year:'numeric' });
}

function riskColor(level) {
  if (level === 'high') return 'var(--red)';
  if (level === 'medium') return 'var(--orange)';
  return 'var(--green)';
}

function renderSummary(summary) {
  return `
    <div class="summary-row">
      <div class="sc sc-cyan">
        <div class="sc-val">${summary.total}</div>
        <div class="sc-label">Toplam Sipariş</div>
      </div>
      <div class="sc sc-red">
        <div class="sc-val">${summary.highRiskCount}</div>
        <div class="sc-label">Yüksek Risk</div>
      </div>
      <div class="sc sc-orange">
        <div class="sc-val">${summary.mediumRiskCount}</div>
        <div class="sc-label">Orta Risk</div>
      </div>
      <div class="sc sc-green">
        <div class="sc-val">${summary.lowRiskCount}</div>
        <div class="sc-label">Düşük Risk</div>
      </div>
      <div class="sc sc-gray">
        <div class="sc-val">%${summary.avgScore}</div>
        <div class="sc-label">Ort. Risk Skoru</div>
      </div>
    </div>
  `;
}

function renderFilterBar(orders) {
  const high   = orders.filter(o => o.risk.level === 'high').length;
  const medium = orders.filter(o => o.risk.level === 'medium').length;
  const low    = orders.filter(o => o.risk.level === 'low').length;
  return `
    <div class="filter-bar">
      <button class="filter-btn ${currentFilter==='all'?'active':''}" onclick="setFilter('all')">Tümü <span class="filter-count">${orders.length}</span></button>
      <button class="filter-btn ${currentFilter==='high'?'active':''}" onclick="setFilter('high')" style="${currentFilter==='high'?'':''}">🔴 Yüksek Risk <span class="filter-count">${high}</span></button>
      <button class="filter-btn ${currentFilter==='medium'?'active':''}" onclick="setFilter('medium')">🟡 Orta Risk <span class="filter-count">${medium}</span></button>
      <button class="filter-btn ${currentFilter==='low'?'active':''}" onclick="setFilter('low')">🟢 Düşük Risk <span class="filter-count">${low}</span></button>
    </div>
  `;
}

function renderOrders(orders) {
  if (orders.length === 0) {
    return `<div class="empty-state"><div class="es-icon">📭</div><div class="es-title">Sipariş bulunamadı</div><div class="es-sub">Bu filtreye uyan sipariş yok.</div></div>`;
  }

  return `
    <div class="report-header">
      <div>Sipariş</div>
      <div>Tutar</div>
      <div>Tarih</div>
      <div>Risk Nedenleri</div>
      <div>Risk Skoru</div>
      <div></div>
    </div>
    <div class="report-list">
      ${orders.map(order => {
        const r = order.risk;
        const d = order.details;
        const badgeCls = r.level === 'high' ? 'rb-high' : r.level === 'medium' ? 'rb-medium' : 'rb-low';
        const levelTR  = r.level === 'high' ? 'YÜKSEK' : r.level === 'medium' ? 'ORTA' : 'DÜŞÜK';
        const reasonPreview = r.risks.length > 0 ? r.risks[0] + (r.risks.length > 1 ? ` +${r.risks.length-1}` : '') : 'Risk sinyali yok';

        const financialTR = {
          paid: 'Ödendi', pending: 'Beklemede', refunded: 'İade Edildi',
          partially_refunded: 'Kısmi İade', voided: 'İptal', authorized: 'Onaylandı'
        }[d.financialStatus] || d.financialStatus;

        const fulfillmentTR = {
          fulfilled: 'Gönderildi', unfulfilled: 'Gönderilmedi', partial: 'Kısmi'
        }[d.fulfillmentStatus] || d.fulfillmentStatus;

        const financialCls = ['refunded','voided'].includes(d.financialStatus) ? 'risk' : d.financialStatus === 'paid' ? 'safe' : 'warn';

        return `
          <div class="report-card" id="card-${order.id}" onclick="toggleCard('${order.id}')">
            <div class="rc-main">
              <div class="rc-num">#${order.order_number}</div>
              <div class="rc-price">$${parseFloat(order.total_price).toFixed(2)}</div>
              <div class="rc-date">${formatDate(order.created_at)}</div>
              <div class="rc-risks ${r.risks.length > 0 ? 'has-risk' : ''}">${reasonPreview}</div>
              <div class="risk-badge ${badgeCls}">${levelTR} — %${r.score}</div>
              <div class="rc-expand">▼</div>
            </div>
            <div class="rc-detail">
              <div class="detail-grid">
                <div class="detail-block">
                  <div class="db-title">👤 Müşteri Bilgileri</div>
                  <div class="db-row"><span class="db-key">Ad Soyad</span><span class="db-val">${d.customerName || '—'}</span></div>
                  <div class="db-row"><span class="db-key">Email</span><span class="db-val">${d.customerEmail || 'Misafir'}</span></div>
                  <div class="db-row"><span class="db-key">Hesap Yaşı</span><span class="db-val ${d.accountAgeDays !== null && d.accountAgeDays < 7 ? 'risk' : 'safe'}">${d.accountAgeDays !== null ? d.accountAgeDays + ' gün' : 'Misafir'}</span></div>
                  <div class="db-row"><span class="db-key">Toplam Sipariş</span><span class="db-val">${d.totalOrders}</span></div>
                </div>
                <div class="detail-block">
                  <div class="db-title">📍 Adres Analizi</div>
                  <div class="db-row"><span class="db-key">Fatura Ülkesi</span><span class="db-val">${d.billingCountry || '—'}</span></div>
                  <div class="db-row"><span class="db-key">Teslimat Ülkesi</span><span class="db-val ${d.billingCountry && d.shippingCountry && d.billingCountry !== d.shippingCountry ? 'risk' : 'safe'}">${d.shippingCountry || '—'}</span></div>
                  <div class="db-row"><span class="db-key">Fatura Şehri</span><span class="db-val">${d.billingCity || '—'}</span></div>
                  <div class="db-row"><span class="db-key">Teslimat Şehri</span><span class="db-val">${d.shippingCity || '—'}</span></div>
                </div>
                <div class="detail-block">
                  <div class="db-title">💳 Ödeme Bilgileri</div>
                  <div class="db-row"><span class="db-key">Tutar</span><span class="db-val">$${parseFloat(order.total_price).toFixed(2)}</span></div>
                  <div class="db-row"><span class="db-key">Finansal Durum</span><span class="db-val ${financialCls}">${financialTR}</span></div>
                  <div class="db-row"><span class="db-key">Gönderim Durumu</span><span class="db-val">${fulfillmentTR}</span></div>
                  <div class="db-row"><span class="db-key">Ödeme Yöntemi</span><span class="db-val">${d.gateway}</span></div>
                </div>
              </div>
              ${r.risks.length > 0 ? `
                <div class="risk-reasons">
                  <div class="rr-title">🚨 Tespit Edilen Risk Sinyalleri</div>
                  <div class="rr-list">
                    ${r.risks.map(risk => `
                      <div class="rr-item ${r.level === 'high' ? 'rr-high' : r.level === 'medium' ? 'rr-med' : 'rr-low'}">
                        ⚠ ${risk}
                      </div>
                    `).join('')}
                  </div>
                </div>
              ` : `
                <div class="risk-reasons">
                  <div class="rr-title">✅ Risk Değerlendirmesi</div>
                  <div class="rr-list">
                    <div class="rr-item rr-low">✔ Risk sinyali tespit edilmedi — Göndermek güvenli.</div>
                  </div>
                </div>
              `}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function toggleCard(id) {
  const card = document.getElementById(`card-${id}`);
  card.classList.toggle('expanded');
}

function setFilter(filter) {
  currentFilter = filter;
  const filtered = filter === 'all' ? allOrders : allOrders.filter(o => o.risk.level === filter);
  document.getElementById('main-content').innerHTML =
    renderSummary(computeSummary(allOrders)) +
    renderFilterBar(allOrders) +
    renderOrders(filtered);
}

function computeSummary(orders) {
  return {
    total: orders.length,
    highRiskCount:   orders.filter(o => o.risk.level === 'high').length,
    mediumRiskCount: orders.filter(o => o.risk.level === 'medium').length,
    lowRiskCount:    orders.filter(o => o.risk.level === 'low').length,
    avgScore: orders.length > 0
      ? Math.round(orders.reduce((s, o) => s + o.risk.score, 0) / orders.length)
      : 0
  };
}

async function startCheckout() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) return;
  try {
    const res = await fetch('/api/paddle-checkout', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        priceId:    PRICE_IDS.elite,
        email:      session.user.email,
        userId:     session.user.id,
        shopDomain: localStorage.getItem('shopify_shop') || ''
      })
    });
    const data = await res.json();
    if (data.checkoutUrl) window.location.href = data.checkoutUrl;
  } catch(e) { alert('Hata oluştu.'); }
}

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }

  const shop = localStorage.getItem('shopify_shop');
  if (!shop) { window.location.href = 'dashboard.html'; return; }

  try {
    const res = await fetch(`/api/fraud-report?shop=${encodeURIComponent(shop)}`, {
      headers: { 'Authorization': `Bearer ${session.access_token}` }
    });

    if (res.status === 403) {
      document.getElementById('main-content').innerHTML = `
        <div class="elite-gate">
          <div class="eg-icon">⚡</div>
          <div class="eg-title">Elite Özelliği</div>
          <div class="eg-sub">Detaylı Fraud Raporu yalnızca Shield Elite üyelerine özeldir. Müşteri bilgileri, adres analizi ve tüm risk detaylarını görmek için Elite'e geçin.</div>
          <button class="eg-btn" onclick="startCheckout()">Shield Elite'e Geç — $49.90/ay →</button>
        </div>
      `;
      return;
    }

    const data = await res.json();
    if (data.error) throw new Error(data.error);

    allOrders = data.orders || [];

    document.getElementById('main-content').innerHTML =
      renderSummary(data.summary || computeSummary(allOrders)) +
      renderFilterBar(allOrders) +
      renderOrders(allOrders);

  } catch(e) {
    document.getElementById('main-content').innerHTML = `
      <div class="empty-state">
        <div class="es-icon">⚠️</div>
        <div class="es-title">Yükleme Hatası</div>
        <div class="es-sub">${e.message}</div>
      </div>
    `;
  }
}

init();
</script>
</body>
</html>
